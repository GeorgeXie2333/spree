name: Storefront

on:
  push:
    branches: [main]
    paths:
      - "apps/storefront/**"
      - "packages/sdk/**"
      - "packages/sdk-core/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".npmrc"
      - "biome.json"
      - ".github/workflows/storefront.yml"
  pull_request:
    paths:
      - "apps/storefront/**"
      - "packages/sdk/**"
      - "packages/sdk-core/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".npmrc"
      - "biome.json"
      - ".github/workflows/storefront.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Biome
        run: pnpm --filter @cenwatch/storefront check

      - name: TypeScript
        run: pnpm --filter @cenwatch/storefront typecheck

      - name: Unit tests
        run: pnpm --filter @cenwatch/storefront test

      - name: Locale parity
        run: pnpm --filter @cenwatch/storefront check:locales

      - name: Production build
        run: pnpm --filter @cenwatch/storefront build

  e2e:
    name: E2E (Playwright + Spree)
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Fail if Stripe keys are not configured
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ vars.STRIPE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$STRIPE_SECRET_KEY" ] || [ -z "$STRIPE_PUBLISHABLE_KEY" ]; then
            echo "::error::STRIPE_SECRET_KEY (repository secret) and STRIPE_PUBLISHABLE_KEY (repository variable) must be set under Settings > Secrets and variables > Actions. Use a sk_test_ / pk_test_ pair from your Stripe sandbox."
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter @cenwatch/storefront exec node -p \"require('@playwright/test/package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @cenwatch/storefront exec playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @cenwatch/storefront exec playwright install-deps chromium

      - name: Boot Spree backend
        run: docker compose -f apps/storefront/e2e-backend/docker-compose.yml up -d --wait

      - name: Seed Spree and issue API key
        working-directory: apps/storefront
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ vars.STRIPE_PUBLISHABLE_KEY }}
        run: ./scripts/e2e/bootstrap-spree.sh

      - name: Run Playwright tests
        run: pnpm --filter @cenwatch/storefront test:e2e

      - name: Dump Spree logs on failure
        if: failure()
        run: docker compose -f apps/storefront/e2e-backend/docker-compose.yml logs --no-color web > spree.log || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: storefront-playwright-report
          path: |
            apps/storefront/playwright-report/
            apps/storefront/test-results/
            spree.log
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose -f apps/storefront/e2e-backend/docker-compose.yml down -v
